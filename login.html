<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン｜White Snow Paws</title>
    <meta name="description" content="White Snow Pawsのログインページ。会員の方はこちらからログインしてください。">
    <meta name="robots" content="noindex, follow">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/overrides.css">

    <style>
        .login-page { min-height: 100vh; display: flex; flex-direction: column; }

        /* ヒーロー */
        .login-hero {
            background: linear-gradient(180deg, rgba(17,17,17,0.92) 0%, rgba(17,17,17,0.80) 100%);
            padding: 120px 20px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .login-hero-en {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
        }
        .login-hero h1 {
            font-family: 'Noto Serif JP', serif;
            font-size: 26px;
            color: #FFFFFF;
            letter-spacing: 4px;
        }

        /* コンテナ */
        .login-container { flex: 1; max-width: 460px; width: 100%; margin: 0 auto; padding: 52px 20px 80px; }

        /* カード */
        .login-card {
            background: #FFFFFF;
            border: 1px solid #CCCCCC;
            border-radius: 5px;
            padding: 40px 36px;
        }
        .login-card-title {
            font-family: 'Noto Serif JP', serif;
            font-size: 18px;
            color: #464646;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid #EEEEEE;
        }

        /* フォーム */
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-label { font-size: 12px; font-weight: 700; color: #464646; letter-spacing: 1px; }
        .form-input-wrap { position: relative; }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #CCCCCC;
            border-radius: 5px;
            background: #FFFFFF;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 14px;
            color: #464646;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }
        .form-input:focus {
            border-color: #111111;
            box-shadow: 0 0 0 2px rgba(17,17,17,0.08);
            outline: none;
        }
        .form-input.error { border-color: #C0392B; }

        /* パスワードトグル */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999999;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .password-toggle:hover { color: #111111; }
        .form-input[type="password"], .form-input[type="text"] { padding-right: 46px; }

        /* エラー */
        .form-error-msg {
            display: none;
            font-size: 12px;
            color: #C0392B;
            padding: 10px 14px;
            background: rgba(192,57,43,0.06);
            border: 1px solid rgba(192,57,43,0.2);
            border-radius: 4px;
            margin-bottom: 16px;
            text-align: center;
        }
        .form-error-msg.visible { display: block; }

        /* パスワード忘れ */
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 12px;
            color: #666666;
            margin-top: -8px;
            margin-bottom: 24px;
            text-decoration: underline;
        }
        .forgot-link:hover { color: #111111; }

        /* ログインボタン */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #111111;
            color: #FFFFFF;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 3px;
            border-radius: 5px;
            border: 1px solid #111111;
            cursor: pointer;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .login-btn:hover { opacity: 0.8; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 区切り */
        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #EEEEEE; }
        .divider span { font-size: 11px; color: #999999; letter-spacing: 2px; }

        /* 新規登録リンク */
        .register-link-box {
            text-align: center;
            padding: 16px;
            background: #F7F7F7;
            border: 1px solid #CCCCCC;
            border-radius: 5px;
        }
        .register-link-box p { font-size: 13px; color: #666666; margin-bottom: 10px; }
        .register-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 24px;
            border: 1px solid #CCCCCC;
            border-radius: 5px;
            color: #464646;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            letter-spacing: 2px;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
            text-decoration: none;
        }
        .register-link-btn:hover { background: #111111; color: #FFFFFF; border-color: #111111; }

        /* ログイン完了 */
        .login-success {
            display: none;
            text-align: center;
            padding: 48px 24px;
            background: #FFFFFF;
            border: 1px solid #CCCCCC;
            border-radius: 5px;
        }
        .login-success .success-icon { font-size: 52px; margin-bottom: 16px; }
        .login-success h2 {
            font-family: 'Noto Serif JP', serif;
            font-size: 22px;
            color: #464646;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .login-success p { font-size: 13px; color: #666666; line-height: 2; margin-bottom: 24px; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: transparent;
            color: #111111;
            border: 1px solid #111111;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            letter-spacing: 2px;
            border-radius: 5px;
            transition: background 0.3s, color 0.3s;
            text-decoration: none;
        }
        .back-btn:hover { background: #111111; color: #FFFFFF; }

        @media (max-width: 480px) { .login-card { padding: 28px 20px; } }
    </style>
</head>

<body class="login-page">

    <!-- ヘッダー -->
    <header class="header scrolled" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <span class="logo-mark">✦</span>
                White Snow Paws
            </a>
            <div class="header-icons">
                <button aria-label="検索" class="header-icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <span class="header-icon-label">SEARCH</span>
                </button>
                <a href="register.html" class="header-icon-btn" style="text-decoration:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                    <span class="header-icon-label">SIGN UP</span>
                </a>
                <a href="login.html" class="header-icon-btn" style="text-decoration:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <span class="header-icon-label">LOGIN</span>
                </a>
                <button aria-label="カート" class="header-icon-btn" style="position:relative;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 0 1-8 0" />
                    </svg>
                    <span class="cart-badge">0</span>
                    <span class="header-icon-label">CART</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ヒーロー -->
    <div class="login-hero">
        <p class="login-hero-en">── MEMBER LOGIN ──</p>
        <h1>ログイン</h1>
    </div>

    <!-- メイン -->
    <main class="login-container">

        <!-- ログインカード -->
        <div class="login-card" id="loginCard">
            <h2 class="login-card-title">会員ログイン</h2>

            <!-- エラーメッセージ -->
            <div class="form-error-msg" id="loginError">
                メールアドレスまたはパスワードが正しくありません。
            </div>

            <form id="loginForm" novalidate>

                <!-- メールアドレス -->
                <div class="form-group">
                    <label class="form-label" for="email">メールアドレス</label>
                    <div class="form-input-wrap">
                        <input type="email" id="email" name="email" class="form-input" placeholder="example@email.com"
                            required autocomplete="email">
                    </div>
                </div>

                <!-- パスワード -->
                <div class="form-group">
                    <label class="form-label" for="password">パスワード</label>
                    <div class="form-input-wrap">
                        <input type="password" id="password" name="password" class="form-input" placeholder="パスワードを入力"
                            required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="パスワードを表示">
                            <!-- 目のアイコン（非表示状態） -->
                            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- パスワードを忘れた -->
                <a href="#" class="forgot-link">パスワードをお忘れの方</a>

                <!-- ログインボタン -->
                <button type="submit" class="login-btn" id="loginBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" y1="12" x2="3" y2="12" />
                    </svg>
                    ログイン
                </button>

            </form>

            <div class="divider"><span>または</span></div>

            <!-- 新規登録リンク -->
            <div class="register-link-box">
                <p>まだ会員登録がお済みでない方</p>
                <a href="register.html" class="register-link-btn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                    新規会員登録
                </a>
            </div>
        </div>

        <!-- ログイン完了メッセージ -->
        <div class="login-success" id="loginSuccess">
            <div class="success-icon">🐾</div>
            <h2>ログインしました</h2>
            <p>
                おかえりなさい！<br>
                マイページをご利用いただけます。
            </p>
            <a href="index.html" class="back-btn">← トップページに戻る</a>
        </div>

    </main>

    <!-- フッター -->
    <div class="wood-plank-divider"></div>
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-logo">
                <a href="index.html" class="logo">
                    <span class="logo-mark">✦</span>
                    White Snow Paws
                </a>
            </div>
            <div class="footer-bottom">
                <a href="terms.html">利用規約</a>
                <a href="privacy.html">プライバシーポリシー</a>
                <a href="contact.html">お問い合わせ</a>
                &copy; 2026 White Snow Paws. All Rights Reserved.
            </div>
        </div>
    </footer>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // パスワード表示切替
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = document.getElementById('eyeIcon');

        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.innerHTML = isPassword
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
        });

        // ログイン済みならリダイレクト
        WSP_Auth.getUser().then(user => {
            if (user) window.location.href = 'mypage.html';
        });

        // フォーム送信（Supabase）
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                errorEl.textContent = 'メールアドレスとパスワードを入力してください。';
                errorEl.classList.add('visible');
                return;
            }

            errorEl.classList.remove('visible');
            btn.textContent = 'ログイン中...';
            btn.disabled = true;

            try {
                await WSP_Auth.login(email, password);
                // チェックアウトから来た場合は戻る
                const returnTo = new URLSearchParams(window.location.search).get('return');
                window.location.href = returnTo || 'mypage.html';
            } catch (err) {
                let msg = 'メールアドレスまたはパスワードが正しくありません。';
                if (err.message && err.message.includes('Email not confirmed')) {
                    msg = 'メールアドレスの確認が完了していません。確認メールをご確認ください。';
                }
                errorEl.textContent = msg;
                errorEl.classList.add('visible');
                btn.textContent = 'ログイン';
                btn.disabled = false;
            }
        });

        // パスワードリセット
        document.querySelector('.forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                alert('メールアドレスを入力してからクリックしてください。');
                return;
            }
            try {
                await WSP_Auth.resetPassword(email);
                alert('パスワードリセットメールを送信しました。\nメールをご確認ください。');
            } catch (err) {
                alert('送信に失敗しました。メールアドレスを確認してください。');
            }
        });
    </script>

    <!-- JavaScript -->
    <script src="js/main.js"></script>

</body>

</html>
