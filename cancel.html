<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>決済キャンセル｜White Snow Paws</title>
  <meta name="robots" content="noindex, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css?v=20260316">
  <link rel="stylesheet" href="css/overrides.css?v=20260316">

  <style>
    .cancel-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .cancel-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
    }
    .cancel-card {
      max-width: 560px;
      width: 100%;
      background: #FAF8F5;
      border: 2px solid #D4C4B0;
      border-radius: 10px;
      padding: 52px 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(44,36,28,0.08);
    }
    @media (max-width: 480px) { .cancel-card { padding: 36px 20px; } }

    .cancel-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #A08060, #8B6F47);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    .cancel-en {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      letter-spacing: 5px;
      color: #A08060;
      margin-bottom: 10px;
    }
    .cancel-title {
      font-family: 'Zen Old Mincho', serif;
      font-size: 24px;
      color: #2C241C;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }
    .cancel-message {
      font-size: 14px;
      color: #7A6B5D;
      line-height: 2.2;
      margin-bottom: 36px;
    }
    .cancel-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .btn-back-cart {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 36px;
      background: linear-gradient(180deg, #4A7C59 0%, #3A6349 100%);
      color: #FAF8F5;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      letter-spacing: 3px;
      border-radius: 6px;
      transition: background 0.3s, transform 0.3s;
      box-shadow: 0 4px 12px rgba(74,124,89,0.3);
    }
    .btn-back-cart:hover {
      background: linear-gradient(180deg, #3A6349 0%, #2D5039 100%);
      transform: translateY(-2px);
    }
    .btn-link {
      font-size: 13px;
      color: #4A7C59;
      text-decoration: underline;
    }
    .btn-link:hover { color: #3A6349; }
  </style>
</head>

<body class="cancel-page">
  <!-- ヘッダー -->
  <header class="header scrolled" id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">✦</span>
        White Snow Paws
      </a>
      <div class="header-icons">
        <a href="cart.html" class="header-icon-btn" style="position:relative;text-decoration:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span class="cart-badge" id="cartBadge">0</span>
          <span class="header-icon-label">CART</span>
        </a>
      </div>
    </div>
  </header>

  <!-- メイン -->
  <main class="cancel-main">
    <div class="cancel-card">
      <div class="cancel-icon">🛒</div>

      <p class="cancel-en">── PAYMENT CANCELLED ──</p>
      <h1 class="cancel-title">決済がキャンセルされました</h1>

      <p class="cancel-message">
        お支払いがキャンセルされました。<br>
        カート内の商品はそのまま保持されています。<br>
        引き続きお買い物をお楽しみください。
      </p>

      <div class="cancel-buttons">
        <a href="cart.html" class="btn-back-cart">
          ← カートに戻る
        </a>
        <a href="index.html" class="btn-link">
          トップページに戻る
        </a>
        <a href="contact.html" class="btn-link">
          お問い合わせ
        </a>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <div class="wood-plank-divider"></div>
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <a href="index.html" class="logo"><span class="logo-mark">✦</span> White Snow Paws</a>
      </div>
      <div class="footer-bottom">
        <a href="terms.html">利用規約</a>
        <a href="privacy.html">プライバシーポリシー</a>
        <a href="contact.html">お問い合わせ</a>
        &copy; 2026 White Snow Paws. All Rights Reserved.
      </div>
    </div>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/main.js?v=20260316"></script>
</body>

</html>
